name: ML Project CI-CD Pipeline

on:
  push:
    branches: [ main ]

  pull_request:
    branches: [ main ]

jobs:

  build-test-train:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Train Model
        run: |
          python model.py

      - name: Verify Model File
        run: |
          test -f best_model.pkl

  docker-build-push:

    needs: build-test-train

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/mobile-addiction-app:latest .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/mobile-addiction-app:latest

  deploy:

    needs: docker-build-push

    runs-on: ubuntu-latest

    steps:

      - name: Deploy Application
        run: |
          echo "Deploying Application..."

          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/mobile-addiction-app:latest

          docker stop mobile-addiction-app || true
          docker rm mobile-addiction-app || true

          docker run -d \
            --name mobile-addiction-app \
            -p 8000:8000 \
            ${{ secrets.DOCKERHUB_USERNAME }}/mobile-addiction-app:latest